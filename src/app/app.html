<div class="min-h-dvh grid grid-rows-[auto_1fr]">
  <header
    class="sticky top-0 z-10 flex justify-between items-center py-4 px-8 backdrop-blur-[24px] [-webkit-backdrop-filter:blur(24px)]">
    <a routerLink="/" class="grid gap-[0.15rem]">
      <h2 class="">Share Text</h2>
    </a>

    <div class="flex items-center gap-1 bg-surface-low rounded-full py-1 pl-4 pr-1">
      <input
        class="bg-transparent border-none outline-none text-sm text-on-surface w-48 min-w-0 placeholder:text-on-surface-variant"
        [(ngModel)]="alias" placeholder="Your name…" aria-label="Display name" />
      <button class="btn btn-ghost" type="button" (click)="updateAlias()">Update</button>
    </div>

    <div class="flex items-center gap-2">
      <label class="" for="themeModeSelect">Theme</label>
      <select id="themeModeSelect" class="appearance-none rounded-xl p-2" [value]="theme.themeMode()"
        (change)="setThemeModeFromSelect($event)" aria-label="Theme mode">
        <option value="system">System</option>
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>
      <span class="" aria-hidden="true">▾</span>
    </div>
  </header>

  <main class="flex flex-col min-h-0">
    <router-outlet />
    <z-toaster [theme]="theme.themeMode()" [duration]="2000" />
  </main>
</div>
