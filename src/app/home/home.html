<div class="">
  <div class="container mx-auto px-4 py-12 max-w-screen-md space-y-12">

    <div class="flex flex-col gap-2 text-center">
      <h1 class="font-display text-[clamp(2rem,5vw,3rem)] font-bold">
        Share Text <span class="text-brand">Instantly</span>
      </h1>
      <p class="">
        A free online real-time text sharing tool. Paste below to start sharing! Others can join and collaborate - no
        account required.
      </p>
    </div>

    <div class="flex flex-col gap-6">
      <textarea class="w-full border rounded-xl p-8 resize-y min-h-[180px]" name="text" id="text"
        [(ngModel)]="textInput" placeholder="Type your message here…" rows="6"></textarea>

      <div class="flex justify-end">
        <button z-button class="btn btn-primary group" zType="brand" (click)="createRoom()">
          Create Room
          <ng-icon name="lucideShare" />
        </button>
      </div>
    </div>

  </div>
</div>
