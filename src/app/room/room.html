<div class="container max-w-screen-md mx-auto px-4 py-8">

  <!-- Room URL Banner -->
  <div class="flex flex-col gap-4 items-center justify-center">
    <button z-button zType="outline" zSize="lg" class="px-4" (click)="copyRoomUrl()">
      <span class="sr-only">Copy URL</span>
      <ng-icon name="lucideLink" />
      {{ roomUrl }}
    </button>
    <qrcode [qrdata]="roomUrl" [width]="100" elementType="svg" class="border rounded-md overflow-hidden"></qrcode>
  </div>

  <!-- Message List -->
  <div class="overflow-y-auto space-y-4 scroll-smooth">
    @for (message of messages(); track $index) {
    <div class="flex" [class.justify-end]="isMyMessage(message)" [class.justify-start]="!isMyMessage(message)">
      <div class="group relative flex flex-col gap-1 p-4 max-w-[min(72%,520px)] rounded-xl" [class]="isMyMessage(message)
            ? 'bg-brand-600 text-white'
            : 'bg-gray-100 dark:bg-muted'">
        <div class="flex items-baseline gap-2">
          <span class="text-xs font-semibold uppercase tracking-[0.05em]" [class.text-primary]="!isMyMessage(message)"
            [class.text-on-primary-muted]="isMyMessage(message)">{{ message.alias }}</span>
          <span class="text-[0.6875rem]" [class.text-on-surface-variant]="!isMyMessage(message)"
            [class.text-on-primary-faded]="isMyMessage(message)">{{ message.created_at | date:'HH:mm' }}</span>
        </div>
        <p class="" [class.text-on-surface]="!isMyMessage(message)" [class.text-on-primary]="isMyMessage(message)">{{
          message.content }}
          <button z-button zType="ghost" (click)="copyMessage(message.content, $index)" aria-label="Copy message">
            <ng-icon name="lucideCopy" class="text-[0.8125rem]" />
          </button>
        </p>
      </div>
    </div>
    }

    @if (messages().length === 0) {
    <div class="flex-1 flex flex-col items-center justify-center gap-4 text-on-surface-variant p-11 text-center">
      <p class="m-0 text-[0.9375rem] leading-relaxed">No messages yet. Be the first to say something.</p>
    </div>
    }
  </div>

  <!-- Composer -->
  <div class="space-y-2">
    <textarea z-input class="" [(ngModel)]="textInput"
      placeholder="Type a message… (Enter to send, Shift+Enter for newline)" rows="1"
      (keydown)="handleComposerKeydown($event)"></textarea>
    <button z-button (click)="newMessage()" [disabled]="!textInput.trim()" aria-label="Send message">
      Send
    </button>
  </div>

</div>
